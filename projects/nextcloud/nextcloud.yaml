k# nextcloud.yaml
# =====================================================
# Nextcloud + Redis
# - läuft als www-data (UID 33)
# - fixt alte UID-1000 Dateien per initContainer
# - persistent über PVC nextcloud-pvc
# =====================================================

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2
          args: ["--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nextcloud
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# Nextcloud Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      # 🔐 SecurityContext: www-data
      securityContext:
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33

      # 🛠️ Einmaliger Fix für alte UID-1000 Dateien
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Fixing Nextcloud permissions..."
              chown -R 33:33 /var/www/html
              chmod 750 /var/www/html/config
              chmod 640 /var/www/html/config/config.php || true
          volumeMounts:
            - name: nextcloud-data
              mountPath: /var/www/html

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - worker1

      containers:
        - name: nextcloud
          image: nextcloud:32.0.5-apache
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          env:
            - name: MYSQL_HOST
              value: mariadb
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mysql-database
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: mysql-password
            - name: REDIS_HOST
              value: redis

          volumeMounts:
            - name: nextcloud-data
              mountPath: /var/www/html

      volumes:
        - name: nextcloud-data
          persistentVolumeClaim:
            claimName: nextcloud-pvc

---
# Nextcloud Service
apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  selector:
    app: nextcloud
  ports:
    - port: 80
      targetPort: 80

