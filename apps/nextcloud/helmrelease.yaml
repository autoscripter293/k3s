apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 5m
  chart:
    spec:
      chart: nextcloud
      version: ">=3.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  values:
    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - host: nextcloud.druckruck.de
          paths:
            - path: /
              pathType: Prefix

    nextcloud:
      nodeSelector:
        kubernetes.io/hostname: "worker1"
      extraEnv:
        - name: MYSQL_HOST
          value: "nextcloud-mariadb.nextcloud.svc.cluster.local"
        - name: MYSQL_DATABASE
          value: "nextcloud"
        - name: MYSQL_USER
          value: "nextcloud"
        - name: MYSQL_PASSWORD
          value: "Schanzenschiss1873402!"
        - name: PHP_EXTENSIONS
          value: "mbstring,intl,bcmath"

      # Wir binden die Volumes hier MANUELL ein, 
      # um die Chart-Logik zu umgehen
      extraVolumes:
        - name: host-data
          hostPath:
            path: /var/openebs/nextcloud/data
        - name: host-config
          hostPath:
            path: /var/openebs/nextcloud/config
        - name: host-apps
          hostPath:
            path: /var/openebs/nextcloud/custom_apps
      extraVolumeMounts:
        - name: host-data
          mountPath: /var/www/html/data
        - name: host-config
          mountPath: /var/www/html/config
        - name: host-apps
          mountPath: /var/www/html/custom_apps

    # WICHTIG: Wir schalten die internen Mounts des Charts EXPLIZIT aus
    persistence:
      enabled: false
      nextcloudData:
        enabled: false
      nextcloudConfig:
        enabled: false
      nextcloudApps:
        enabled: false

    mariadb:
      enabled: true
      image:
        tag: "10.11"
      auth:
        rootPassword: "Schanzenschiss1873402!"
        database: nextcloud
        username: nextcloud
        password: "Schanzenschiss1873402!"
      primary:
        nodeSelector:
          kubernetes.io/hostname: "worker1"
        persistence:
          enabled: true
          existingClaim: "mariadb-existing-pvc"
