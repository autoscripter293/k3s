kapiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 5m
  chart:
    spec:
      chart: nextcloud
      version: ">=3.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  values:
    # --- GLOBALER FIX: Zwingt ALLES (auch den Web-Pod) auf Worker1 ---
    nodeSelector:
      kubernetes.io/hostname: "worker1"

    # --- Ingress ---
    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - host: nextcloud.druckruck.de
          paths:
            - path: /
              pathType: Prefix

    # --- Nextcloud App Konfiguration ---
    nextcloud:
      # Zur Sicherheit auch hier drin lassen
      nodeSelector:
        kubernetes.io/hostname: "worker1"
      extraEnv:
        - name: MYSQL_HOST
          value: "nextcloud-mariadb.nextcloud.svc.cluster.local"
        - name: MYSQL_DATABASE
          value: "nextcloud"
        - name: MYSQL_USER
          value: "nextcloud"
        - name: MYSQL_PASSWORD
          value: "Schanzenschiss1873402!"
        - name: PHP_EXTENSIONS
          value: "mbstring,intl,bcmath"
        - name: OPCACHE_MEMORY_CONSUMPTION
          value: "512"
        - name: OPCACHE_INTERNED_STRINGS_BUFFER
          value: "16"
        - name: OPCACHE_MAX_ACCELERATED_FILES
          value: "10000"

    # --- Persistence (hostPath auf Worker1) ---
    persistence:
      enabled: true
      nextcloudData:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/data
      nextcloudConfig:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/config
      nextcloudApps:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/custom_apps

    # --- MariaDB (Bleibt wie gehabt) ---
    mariadb:
      enabled: true
      image:
        tag: "10.11"
      auth:
        rootPassword: "Schanzenschiss1873402!"
        database: nextcloud
        username: nextcloud
        password: "Schanzenschiss1873402!"
      primary:
        nodeSelector:
          kubernetes.io/hostname: "worker1"
        persistence:
          enabled: true
          existingClaim: "mariadb-existing-pvc"
