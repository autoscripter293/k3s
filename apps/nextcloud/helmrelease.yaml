apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 5m
  chart:
    spec:
      chart: nextcloud
      version: ">=6.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  values:
    nodeSelector:
      kubernetes.io/hostname: worker1

    nextcloud:
      host: nextcloud.druckruck.de
      extraEnv:
        - name: MYSQL_HOST
          value: "nextcloud-mariadb.nextcloud.svc.cluster.local"
        - name: MYSQL_DATABASE
          value: "nextcloud"
        - name: MYSQL_USER
          value: "nextcloud"
        - name: MYSQL_PASSWORD
          value: "Schanzenschiss1873402!"
      # Admin-Daten für den Initial-Start
      username: admin
      password: Schanzenschiss1873402!

    persistence:
      enabled: true
      # --- HIER SIND DEINE 100 GB ---
      size: 100Gi
      # ------------------------------

    mariadb:
      enabled: true
      image:
        repository: bitnami/mariadb
        tag: 10.11.7-debian-12-r0
      primary:
        nodeSelector:
          kubernetes.io/hostname: "worker1"
        persistence:
          enabled: true
          existingClaim: "mariadb-existing-pvc"
