apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 5m
  chart:
    spec:
      chart: nextcloud
      version: ">=3.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
  values:
    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - host: druckruck.de
          paths:
            - path: /
              pathType: Prefix

    nextcloud:
      nodeSelector:
        kubernetes.io/hostname: "worker1"
      extraEnv:
        # Falls MariaDB über das Chart läuft, ist das meist der interne Hostname
        - name: MYSQL_HOST
          value: "nextcloud-mariadb.nextcloud.svc.cluster.local"
        - name: MYSQL_DATABASE
          value: "nextcloud"
        - name: MYSQL_USER
          value: "nextcloud"
        - name: MYSQL_PASSWORD
          value: "Schanzenschiss1873402!"
        - name: PHP_EXTENSIONS
          value: "mbstring,intl,bcmath"
        - name: OPCACHE_MEMORY_CONSUMPTION
          value: "512"
        - name: OPCACHE_INTERNED_STRINGS_BUFFER
          value: "16"
        - name: OPCACHE_MAX_ACCELERATED_FILES
          value: "10000"

      extraVolumes:
        - name: nc-data
          hostPath:
            path: /var/openebs/nextcloud/data
        - name: nc-config
          hostPath:
            path: /var/openebs/nextcloud/config
        - name: nc-apps
          hostPath:
            path: /var/openebs/nextcloud/custom_apps
      extraVolumeMounts:
        - name: nc-data
          mountPath: /var/www/html/data
        - name: nc-config
          mountPath: /var/www/html/config
        - name: nc-apps
          mountPath: /var/www/html/custom_apps

    persistence:
      enabled: false 

    mariadb:
      enabled: true
      image:
        tag: "10.11"
      auth:
        rootPassword: "Schanzenschiss1873402!"
        database: nextcloud
        username: nextcloud
        password: "Schanzenschiss1873402!"
      primary:
        nodeSelector:
          kubernetes.io/hostname: "worker1"
        podSecurityContext:
          enabled: true
          fsGroup: 999
        containerSecurityContext:
          enabled: true
          runAsUser: 999
        persistence:
          enabled: true
          # HIER DIE ÄNDERUNG: Wir nutzen das PVC von oben!
          existingClaim: "mariadb-existing-pvc"
