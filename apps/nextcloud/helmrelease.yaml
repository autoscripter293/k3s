            - path: /
              pathType: Prefix
    
    nextcloud:
      host: nextcloud.druckruck.de
      username: admin
      password: "Schanzenschiss1873402!"
    
    # 👉 Nextcloud Daten (100GB auf worker1)
    persistence:
      enabled: true
