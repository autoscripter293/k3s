apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 5m
  chart:
    spec:
      chart: nextcloud
      version: ">=3.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud

  # --- DAS IST DER WICHTIGSTE TEIL: DIE BRECHSTANGE ---
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: nextcloud
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: nextcloud
              spec:
                template:
                  spec:
                    nodeSelector:
                      kubernetes.io/hostname: worker1
  # ----------------------------------------------------

  values:
    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - host: nextcloud.druckruck.de
          paths:
            - path: /
              pathType: Prefix

    nextcloud:
      extraEnv:
        - name: MYSQL_HOST
          value: "nextcloud-mariadb.nextcloud.svc.cluster.local"
        - name: MYSQL_DATABASE
          value: "nextcloud"
        - name: MYSQL_USER
          value: "nextcloud"
        - name: MYSQL_PASSWORD
          value: "Schanzenschiss1873402!"
        - name: PHP_EXTENSIONS
          value: "mbstring,intl,bcmath"
        # Dummy Hash für das Update
        - name: FORCE_REDEPLOY
          value: "final-kustomize-patch-v1"

    persistence:
      enabled: true
      nextcloudData:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/data
      nextcloudConfig:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/config
      nextcloudApps:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/custom_apps

    mariadb:
      enabled: true
      primary:
        nodeSelector:
          kubernetes.io/hostname: "worker1"
        persistence:
          enabled: true
          existingClaim: "mariadb-existing-pvc"
