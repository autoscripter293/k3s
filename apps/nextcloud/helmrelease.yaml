kapiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 5m
  chart:
    spec:
      chart: nextcloud
      version: ">=3.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  values:
    # ==========================================
    # NUCLEAR FIX: GANZ OBEN UNTER VALUES
    # ==========================================
    nodeSelector:
      kubernetes.io/hostname: "worker1"

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
              - worker1
    # ==========================================

    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - host: nextcloud.druckruck.de
          paths:
            - path: /
              pathType: Prefix

    nextcloud:
      extraEnv:
        - name: MYSQL_HOST
          value: "nextcloud-mariadb.nextcloud.svc.cluster.local"
        - name: MYSQL_DATABASE
          value: "nextcloud"
        - name: MYSQL_USER
          value: "nextcloud"
        - name: MYSQL_PASSWORD
          value: "Schanzenschiss1873402!"
        - name: PHP_EXTENSIONS
          value: "mbstring,intl,bcmath"
        # Neuer Hash für erzwungenes Update
        - name: FORCE_REDEPLOY
          value: "final-move-v4"

    persistence:
      enabled: true
      nextcloudData:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/data
      nextcloudConfig:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/config
      nextcloudApps:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/custom_apps

    mariadb:
      enabled: true
      primary:
        nodeSelector:
          kubernetes.io/hostname: "worker1"
        persistence:
          enabled: true
          existingClaim: "mariadb-existing-pvc"
