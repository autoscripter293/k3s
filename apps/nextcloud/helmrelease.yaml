apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 5m
  chart:
    spec:
      chart: nextcloud
      version: ">=3.0.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  values:
    # --- Ingress ---
    ingress:
      enabled: true
      className: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - host: nextcloud.druckruck.de
          paths:
            - path: /
              pathType: Prefix

    # --- Nextcloud App (HIER MUSS DIE FORCE-LOGIK REIN) ---
    nextcloud:
      # 1. Force-Affinity direkt im App-Block
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - worker1
      
      nodeSelector:
        kubernetes.io/hostname: "worker1"

      extraEnv:
        - name: MYSQL_HOST
          value: "nextcloud-mariadb.nextcloud.svc.cluster.local"
        - name: MYSQL_DATABASE
          value: "nextcloud"
        - name: MYSQL_USER
          value: "nextcloud"
        - name: MYSQL_PASSWORD
          value: "Schanzenschiss1873402!"
        - name: PHP_EXTENSIONS
          value: "mbstring,intl,bcmath"
        # 2. DUMMY VARIABLE (Zwingt Kubernetes zu einem neuen Hash/Pod)
        - name: FORCE_REDEPLOY
          value: "redeploy-to-worker1-v2"

    # --- Persistence ---
    persistence:
      enabled: true
      nextcloudData:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/data
      nextcloudConfig:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/config
      nextcloudApps:
        enabled: true
        type: hostPath
        hostPath: /var/openebs/nextcloud/custom_apps

    # --- MariaDB ---
    mariadb:
      enabled: true
      primary:
        nodeSelector:
          kubernetes.io/hostname: "worker1"
        persistence:
          enabled: true
          existingClaim: "mariadb-existing-pvc"
